<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- jQuery (required for .load() to work) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MG0KYH98NN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-MG0KYH98NN');
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="../images/logo.png" />

  <!-- Navbar & Footer Loader -->
  <script>
    $(function () {
      $("#navbar").load("../layout/navbar.html");
      $("#footer").load("../layout/footer.html");

  <!-- Page Style -->
  <style>
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }
  </style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen text-center px-6">
  <!-- Navbar -->
  <div id="navbar" class="w-full"></div>

<!-- Team & Email Form -->

<main class="max-w-2xl mt-10">
  <h1 class="text-4xl sm:text-5xl font-bold text-white mb-6 mt-40">
    Download Allied AutoCorrection
  </h1>

  <p class="text-slate-300 text-lg leading-relaxed mb-8">
    Allied AutoCorrection is a powerful and precise function for all FLL teams...
  </p>

  <!-- Form Fields -->

  <div class="flex flex-col gap-4 mb-6">
    <input type="text" id="teamNumber" placeholder="Team #" 
           class="p-3 rounded-lg border border-slate-500 bg-slate-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
    <input type="email" id="email" placeholder="Email" 
           class="p-3 rounded-lg border border-slate-500 bg-slate-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
  </div>

  <!-- Download Button -->

<button id="downloadBtn"
       class="inline-block bg-blue-500 hover:bg-blue-600 text-white font-semibold text-lg px-6 py-3 rounded-lg shadow-md transition-all duration-200 pb-{10px}">
⬇️ Download AutoCorrection.llsp3 </button>

  <p id="status" class="text-slate-400 mt-2 text-sm pb-30"></p>
</main>
<div id="footer" class="w-full mt-auto pt-30"></div>
 <script>
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1377087321203150941/iK28JWFiXjPouGOpEVnvhExkIqPdp8H7P7HT5oSJHdpPFOgMsOde9s8fD-xSnyl_MNbQ"; // Replace with your webhook

    const form = document.getElementById("aacForm");
    const status = document.getElementById("status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const teamNumber = document.getElementById("teamNumber").value.trim();
      const email = document.getElementById("email").value.trim();

      if (!teamNumber || !email) {
        status.textContent = "Please fill out all fields.";
        status.className = "mt-4 text-center text-red-400";
        return;
      }

      status.textContent = "Sending message...";
      status.className = "mt-4 text-center text-yellow-400";

      const payload = {
        content: `**New Contact Message**\n**Team Number:** ${teamNumber}\n**Email:** ${email}\n**Time:** ${new Date().toLocaleString('en-US', { timeZone: 'America/New_York' })}`
      };

      try {
        const response = await fetch(DISCORD_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          status.textContent = "Message sent successfully!";
          status.className = "mt-4 text-center text-green-400";
          form.reset();
        } else {
          status.textContent = `Failed to send message. Status: ${response.status}`;
          status.className = "mt-4 text-center text-red-400";
          console.error(await response.text());
        }
      } catch (error) {
        status.textContent = "Error sending message. Check console.";
        status.className = "mt-4 text-center text-red-400";
        console.error(error);
      }
    });
  </script>



</body>
</html>
